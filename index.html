    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        ::selection{background:rgba(59,130,246,0.3);color:#eff6ff}
        body{font-family:'Inter',sans-serif;background:#050a18;color:#e2e8f0;overflow-x:hidden}
        ::-webkit-scrollbar{width:8px}
        ::-webkit-scrollbar-track{background:#0a1929}
        ::-webkit-scrollbar-thumb{background:#1e3a8a;border-radius:4px}
        ::-webkit-scrollbar-thumb:hover{background:#2563eb}

        #particles-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

        .nav-glass{background:rgba(5,10,24,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(59,130,246,0.08);transition:all 0.3s}
        .nav-link{position:relative;color:#94a3b8;transition:color 0.3s}
        .nav-link:hover,.nav-link.active{color:#60a5fa}
        .nav-link::after{content:'';position:absolute;bottom:-4px;left:50%;width:0;height:2px;background:#3b82f6;transition:all 0.3s;transform:translateX(-50%);border-radius:1px}
        .nav-link:hover::after,.nav-link.active::after{width:100%}

        .hero-bg{background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(30,58,138,0.4) 0%,rgba(5,10,24,0) 70%),radial-gradient(ellipse 60% 40% at 80% 50%,rgba(59,130,246,0.08) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 20% 80%,rgba(30,64,175,0.06) 0%,transparent 70%)}
        .hero-title{background:linear-gradient(135deg,#ffffff 0%,#93c5fd 50%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .hero-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);pointer-events:none;animation:heroGlow 8s ease-in-out infinite}
        @keyframes heroGlow{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.2);opacity:1}}

        .btn-primary{position:relative;display:inline-flex;align-items:center;gap:10px;padding:16px 36px;background:linear-gradient(135deg,#1d4ed8 0%,#2563eb 50%,#3b82f6 100%);color:#fff;font-weight:600;font-size:15px;border-radius:12px;border:1px solid rgba(96,165,250,0.3);cursor:pointer;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 30px rgba(59,130,246,0.2),0 4px 15px rgba(0,0,0,0.3);text-decoration:none;overflow:hidden}
        .btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transition:left 0.6s}
        .btn-primary:hover::before{left:100%}
        .btn-primary:hover{transform:translateY(-3px);box-shadow:0 0 50px rgba(59,130,246,0.35),0 8px 25px rgba(0,0,0,0.4);border-color:rgba(96,165,250,0.5)}
        .btn-primary:active{transform:translateY(-1px)}

        .btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:rgba(30,58,138,0.2);color:#93c5fd;font-weight:500;font-size:14px;border-radius:10px;border:1px solid rgba(59,130,246,0.2);cursor:pointer;transition:all 0.3s;text-decoration:none}
        .btn-secondary:hover{background:rgba(30,58,138,0.4);border-color:rgba(59,130,246,0.4);transform:translateY(-2px);box-shadow:0 0 20px rgba(59,130,246,0.15)}

        .country-card{background:linear-gradient(160deg,rgba(15,23,42,0.95) 0%,rgba(10,25,41,0.98) 100%);border:1px solid rgba(59,130,246,0.07);border-radius:20px;overflow:hidden;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);position:relative;display:flex;flex-direction:column}
        .country-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0),transparent);transition:all 0.5s;z-index:2}
        .country-card:hover{transform:translateY(-6px);border-color:rgba(59,130,246,0.22);box-shadow:0 0 50px rgba(59,130,246,0.08),0 24px 48px rgba(0,0,0,0.4)}
        .country-card:hover::before{background:linear-gradient(90deg,transparent,rgba(59,130,246,0.5),transparent)}
        .country-card .card-banner{width:100%;height:200px;object-fit:cover;transition:transform 0.7s}
        .country-card:hover .card-banner{transform:scale(1.04)}
        .card-banner-wrap{overflow:hidden;position:relative;flex-shrink:0}
        .card-banner-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to top,rgba(10,25,41,0.98),transparent);z-index:1}
        .card-body{padding:24px 28px 28px;display:flex;flex-direction:column;flex:1}

        .member-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;transition:background 0.25s;border:1px solid transparent}
        .member-row:hover{background:rgba(59,130,246,0.04);border-color:rgba(59,130,246,0.06)}
        .member-avatar{width:36px;height:36px;border-radius:10px;flex-shrink:0;overflow:hidden;border:1px solid rgba(59,130,246,0.15);background:rgba(59,130,246,0.08);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#60a5fa}
        .member-avatar img{width:100%;height:100%;object-fit:cover;display:block}
        .member-info{flex:1;min-width:0}
        .member-mc{font-weight:600;font-size:13px;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .member-dc{font-size:11px;color:#64748b;font-family:'Courier New',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .member-role{flex-shrink:0;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap}
        .role-leader{background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.15)}
        .role-builder{background:rgba(59,130,246,0.08);color:#60a5fa;border:1px solid rgba(59,130,246,0.12)}
        .role-member{background:rgba(148,163,184,0.08);color:#94a3b8;border:1px solid rgba(148,163,184,0.1)}
        .role-warrior{background:rgba(239,68,68,0.08);color:#f87171;border:1px solid rgba(239,68,68,0.12)}
        .role-diplomat{background:rgba(168,85,247,0.08);color:#c084fc;border:1px solid rgba(168,85,247,0.12)}

        .stat-card{background:linear-gradient(145deg,rgba(15,23,42,0.8) 0%,rgba(10,25,41,0.9) 100%);border:1px solid rgba(59,130,246,0.1);border-radius:16px;padding:32px;transition:all 0.4s;position:relative;overflow:hidden}
        .stat-card::after{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(59,130,246,0.05) 0%,transparent 70%);transition:all 0.5s}
        .stat-card:hover{border-color:rgba(59,130,246,0.2);transform:translateY(-4px);box-shadow:0 0 30px rgba(59,130,246,0.08)}
        .stat-card:hover::after{top:-30%;right:-30%}

        .moment-card{background:linear-gradient(160deg,rgba(15,23,42,0.9) 0%,rgba(10,25,41,0.95) 100%);border:1px solid rgba(59,130,246,0.07);border-radius:16px;overflow:hidden;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);position:relative}
        .moment-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0),transparent);transition:all 0.5s;z-index:2}
        .moment-card:hover{transform:translateY(-5px);border-color:rgba(59,130,246,0.2);box-shadow:0 0 40px rgba(59,130,246,0.07),0 20px 40px rgba(0,0,0,0.35)}
        .moment-card:hover::before{background:linear-gradient(90deg,transparent,rgba(59,130,246,0.4),transparent)}
        .moment-img-wrap{overflow:hidden;position:relative;cursor:pointer}
        .moment-img-wrap img{width:100%;height:220px;object-fit:cover;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
        .moment-card:hover .moment-img-wrap img{transform:scale(1.05)}
        .moment-img-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to top,rgba(10,25,41,0.95),transparent)}
        .moment-img-wrap .zoom-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);opacity:0;transition:all 0.4s;z-index:2;color:#fff}
        .moment-img-wrap:hover .zoom-icon{opacity:1;transform:translate(-50%,-50%) scale(1)}
        .moment-body{padding:20px 24px 24px}
        .moment-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px}
        .tag-war{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.12)}
        .tag-event{background:rgba(168,85,247,0.1);color:#c084fc;border:1px solid rgba(168,85,247,0.12)}
        .tag-build{background:rgba(59,130,246,0.1);color:#60a5fa;border:1px solid rgba(59,130,246,0.12)}
        .tag-fun{background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.12)}
        .tag-alliance{background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.12)}

        .lightbox{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.92);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.4s;cursor:zoom-out}
        .lightbox.active{opacity:1;visibility:visible}
        .lightbox img{max-width:90vw;max-height:85vh;border-radius:8px;box-shadow:0 25px 80px rgba(0,0,0,0.6);transform:scale(0.9);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1)}
        .lightbox.active img{transform:scale(1)}
        .lightbox-close{position:absolute;top:24px;right:24px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;font-size:20px}
        .lightbox-close:hover{background:rgba(255,255,255,0.2)}

        .section-label{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);border-radius:100px;color:#60a5fa;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
        .section-title{font-size:36px;font-weight:800;color:#f1f5f9;line-height:1.2;letter-spacing:-0.02em}
        .section-desc{color:#64748b;font-size:16px;line-height:1.7;max-width:640px}
        .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.15),transparent)}

        .reveal{opacity:0;transform:translateY(40px);transition:all 0.8s cubic-bezier(0.4,0,0.2,1)}
        .reveal.visible{opacity:1;transform:translateY(0)}
        .reveal-delay-1{transition-delay:0.1s}
        .reveal-delay-2{transition-delay:0.2s}
        .reveal-delay-3{transition-delay:0.3s}
        .reveal-delay-4{transition-delay:0.4s}
        .reveal-delay-5{transition-delay:0.5s}
        .reveal-delay-6{transition-delay:0.6s}
        .reveal-delay-7{transition-delay:0.7s}

        .mobile-menu{position:fixed;inset:0;z-index:90;background:rgba(5,10,24,0.97);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;visibility:hidden;transition:all 0.4s}
        .mobile-menu.active{opacity:1;visibility:visible}
        .mobile-menu a{font-size:24px;font-weight:600;color:#94a3b8;transition:color 0.3s;text-decoration:none}
        .mobile-menu a:hover{color:#60a5fa}

        .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:100;padding:8px}
        .hamburger span{width:24px;height:2px;background:#94a3b8;transition:all 0.3s;border-radius:2px}
        .hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px);background:#60a5fa}
        .hamburger.active span:nth-child(2){opacity:0}
        .hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);background:#60a5fa}

        @media(max-width:768px){
            .hamburger{display:flex}
            .nav-links{display:none !important}
            .section-title{font-size:28px}
            .hero-title{font-size:42px !important}
            .card-body{padding:20px}
            .moment-img-wrap img{height:180px}
            .moment-body{padding:16px 18px 20px}
        }

        .style-tag{display:inline-block;padding:4px 12px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.15);border-radius:6px;font-size:11px;font-weight:600;color:#60a5fa;letter-spacing:0.04em;text-transform:uppercase}
        .coords{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);border-radius:6px;font-size:12px;font-weight:500;color:#34d399;font-family:'Courier New',monospace}

        .float-1{animation:float1 6s ease-in-out infinite}
        .float-2{animation:float2 8s ease-in-out infinite}
        @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        @keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(3deg)}}

        .grid-bg{background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:60px 60px}

        .members-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.1),transparent);margin:16px 0 12px}
        .members-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#475569;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    </style>
</head>
<body class="grid-bg">

<canvas id="particles-canvas"></canvas>

<nav class="nav-glass fixed top-0 left-0 right-0 z-50">

</nav>

<div class="mobile-menu" id="mobileMenu"></div>

<section id="hero" class="hero-bg relative min-h-screen flex items-center justify-center px-6 pt-16">

</section>

<section id="about" class="relative py-24 md:py-32 px-6">

</section>

<section id="countries" class="relative py-24 md:py-32 px-6">
    <div class="divider max-w-7xl mx-auto mb-24"></div>
    <div class="max-w-7xl mx-auto" id="countries-content"></div>
</section>

<section id="map" class="relative py-24 md:py-32 px-6">
    <div class="divider max-w-7xl mx-auto mb-24"></div>
    <div class="max-w-4xl mx-auto text-center" id="map-content"></div>
</section>

<section id="moments" class="relative py-24 md:py-32 px-6">

    <div class="max-w-7xl mx-auto" id="moments-content"></div>
</section>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">
        <iconify-icon icon="mdi:close" width="22"></iconify-icon>
    </button>
    <img id="lightbox-img" src="" alt="">
</div>

<footer class="relative py-16 px-6 border-t border-slate-800/50" id="footer-content"></footer>

function renderAvatar(member) {
    if (member.avatar) {
        return '<div class="member-avatar"><img src="' + member.avatar + '" alt="' + member.mc + '"></div>';
    }
    var letter = member.mc.charAt(0).toUpperCase();
    return '<div class="member-avatar">' + letter + '</div>';
}

function roleClass(role) {
    var map = { 'lider':'role-leader','budowniczy':'role-builder','wojownik':'role-warrior','dyplomata':'role-diplomat','członek':'role-member' };
    return map[role] || 'role-member';
}

function roleLabel(role) {
    var map = { 'lider':'Lider','budowniczy':'Budowniczy','wojownik':'Wojownik','dyplomata':'Dyplomata','członek':'Członek' };
    return map[role] || 'Członek';
}

function momentTagClass(tag) {
    var map = { 'war':'tag-war','event':'tag-event','build':'tag-build','fun':'tag-fun','alliance':'tag-alliance' };
    return map[tag] || 'tag-event';
}

function momentTagLabel(tag) {
    var map = { 'war':'Wojna','event':'Wydarzenie','build':'Budowa','fun':'Śmieszne','alliance':'Sojusz' };
    return map[tag] || 'Wydarzenie';
}

// PARTICLES
// ─────────────────────────────────────────────
(function() {
    var canvas = document.getElementById('particles-canvas');
    var ctx = canvas.getContext('2d');
    var particles = [], w, h;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    function Particle() { this.reset(); }
    Particle.prototype.reset = function() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 1.5 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.4 + 0.1;
    };
    Particle.prototype.update = function() {
        this.x += this.speedX; this.y += this.speedY;
        if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
    };
    Particle.prototype.draw = function() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(96,165,250,' + this.opacity + ')'; ctx.fill();
    };
    var count = Math.min(80, Math.floor((w * h) / 15000));
    for (var i = 0; i < count; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0, 0, w, h);
        for (var i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
        for (var i = 0; i < particles.length; i++) {
            for (var j = i + 1; j < particles.length; j++) {
                var dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = 'rgba(59,130,246,' + (0.06 * (1 - dist / 150)) + ')'; ctx.lineWidth = 0.5; ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animate);
    }
    animate();
})();

// SCROLL REVEAL
// ─────────────────────────────────────────────
var revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.reveal').forEach(function(el) { revealObserver.observe(el); });

// LIGHTBOX
// ─────────────────────────────────────────────
function openLightbox(item) {
    var img = item.querySelector('img');
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox-img').alt = img.alt;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });


// ─────────────────────────────────────────────
// MOBILE NAV
// ─────────────────────────────────────────────
function toggleMobile() {
    document.getElementById('hamburger').classList.toggle('active');
    document.getElementById('mobileMenu').classList.toggle('active');
    document.body.style.overflow = document.getElementById('mobileMenu').classList.contains('active') ? 'hidden' : '';
}
function closeMobile() {
    document.getElementById('hamburger').classList.remove('active');
    document.getElementById('mobileMenu').classList.remove('active');
    document.body.style.overflow = '';
}


// ─────────────────────────────────────────────
// ACTIVE NAV LINK ON SCROLL
// ─────────────────────────────────────────────
var sections = document.querySelectorAll('section[id]');
var navLinks = document.querySelectorAll('.nav-link');
window.addEventListener('scroll', function() {
    var current = '';
    sections.forEach(function(s) { if (scrollY >= s.offsetTop - 100) current = s.id; });
    navLinks.forEach(function(link) {
        link.classList.toggle('active', link.getAttribute('href') === '#' + current);
    });
});


// ─────────────────────────────────────────────
// NAV STYLE ON SCROLL
// ─────────────────────────────────────────────
window.addEventListener('scroll', function() {
    var nav = document.querySelector('nav');
    if (window.scrollY > 50) {
        nav.style.borderBottomColor = 'rgba(59,130,246,0.12)';
        nav.style.background = 'rgba(5,10,24,0.85)';
    } else {
        nav.style.borderBottomColor = 'rgba(59,130,246,0.08)';
        nav.style.background = 'rgba(5,10,24,0.7)';
    }
});
